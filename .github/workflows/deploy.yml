name: Build and deploy to honey93.github.io
                                                                                                                                              
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:                                                                                                                                    
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm                                                                                                                          

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate static site
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run generate                                                                                                                 

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Publish to honey93.github.io
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          cd dist
          git init -q
          git config user.name "github-actions[bot]"                                                                                          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy from Personal-Website@${GITHUB_SHA}"
          git branch -M master
          git push -f "https://x-access-token:${DEPLOY_TOKEN}@github.com/honey93/honey93.github.io.git" master
